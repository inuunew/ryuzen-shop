<div class="kalkulator-page">
    <div class="calculator-card">
        <h3 class="section-title">Pilih Jenis Kalkulator</h3>

        <div class="tab-bar">
            <button class="tab-btn active" data-tab="winrate">
                <i class="fas fa-trophy"></i> Win Rate
            </button>
            <button class="tab-btn" data-tab="magic">
                <i class="fas fa-cog"></i> Magic Wheel
            </button>
            <button class="tab-btn" data-tab="zodiac">
                <i class="fas fa-star-of-life"></i> Zodiac
            </button>
        </div>

        <div class="form-card" id="formContainer"></div>

        <div class="action-buttons">
            <button class="btn reset-btn" id="resetBtn">
                <i class="fas fa-undo-alt"></i> RESET
            </button>
        </div>

        <div class="result-area" id="resultArea">
            <div class="result-placeholder">
                <i class="fas fa-info-circle"></i> Masukkan data terlebih dahulu ya!<br>
                Hasil akan ditampilkan di sini.
            </div>
        </div>
    </div>
</div>
