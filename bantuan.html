.badge{

color:#16a34a;
font-size:11px;
padding:3px 8px;
border-radius:20px;
margin-left:6px;
}

.arrow{
color:#9ca3af;
}

.back{
display:block;
margin-top:25px;
background:#e5e7eb;
text-align:center;
padding:14px;
border-radius:12px;
text-decoration:none;
color:#111;
